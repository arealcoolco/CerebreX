name: Deploy KAIROS Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/kairos/**'
  workflow_dispatch:

concurrency:
  group: deploy-kairos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy cerebrex-kairos
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip deployment if the wrangler.toml still has placeholder resource IDs.
      # Run: wrangler d1 create cerebrex-kairos
      # then update workers/kairos/wrangler.toml with the real ID.
      - name: Check for placeholder IDs
        id: preflight
        run: |
          if grep -q "REPLACE_WITH_YOUR" workers/kairos/wrangler.toml; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  workers/kairos/wrangler.toml still has placeholder resource IDs — skipping deploy."
            echo "   Create the D1 database in Cloudflare, then update wrangler.toml with the real database_id."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy KAIROS Worker
        if: steps.preflight.outputs.skip == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/kairos
