name: Deploy Registry Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/registry/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy cerebrex-registry to Cloudflare
    runs-on: ubuntu-latest
    # Allow failure — KV namespace IDs in wrangler.toml must exist in your account
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/registry
          packageManager: npm
